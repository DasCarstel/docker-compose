# More info at https://github.com/pi-hole/docker-pi-hole/ and https://docs.pi-hole.net/
services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    # For DHCP it is recommended to remove these ports and instead add: network_mode: "host"
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      #- "67:67/udp" # Only required if you are using Pi-hole as your DHCP server
    environment:
      TZ : Europe/Berlin
    # Volumes store your data between container upgrades
    volumes:
      - /etc/docker/pihole/config:/etc/pihole
      - /etc/docker/pihole/dnsmasq.d:/etc/dnsmasq.d
    #   https://github.com/pi-hole/docker-pi-hole#note-on-capabilities
    #cap_add:
      #- NET_ADMIN # Required if you are using Pi-hole as your DHCP server, else not needed
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.entrypoints=http"
      - "traefik.http.routers.pihole.rule=Host(`pihole.mueller-nas.de`)"
      - "traefik.http.middlewares.pihole-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.pihole.middlewares=pihole-https-redirect"
      - "traefik.http.routers.pihole-secure.entrypoints=https"
      - "traefik.http.routers.pihole-secure.rule=Host(`pihole.mueller-nas.de`)"
      - "traefik.http.routers.pihole-secure.tls=true"
      - "traefik.http.routers.pihole-secure.middlewares=authentik@docker,pihole-sso@docker"
      - "traefik.http.routers.pihole-secure.service=pihole"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"
    networks:
      proxy:
    security_opt:
      - no-new-privileges:false # https://github.com/pi-hole/docker-pi-hole/issues/536#issuecomment-571908446

  pihole-sso:
    container_name: pihole-sso
    image: python:3.11-alpine
    restart: unless-stopped
    command: sh -c "python3 /app/sso.py"
    environment:
      - PIHOLE_PASSWORD=sso-pihole-pw
    volumes:
      - /etc/docker/pihole/sso:/app
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.pihole-sso.forwardauth.address=http://pihole-sso:8080/"
      - "traefik.http.middlewares.pihole-sso.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.pihole-sso.forwardauth.authResponseHeaders=X-FTL-SID,X-FTL-CSRF"
      - "traefik.http.services.pihole-sso.loadbalancer.server.port=8080"

networks:
  proxy:
    external: true
services:
  quartz:
    image: ghcr.io/jackyzha0/quartz:latest
    container_name: quartz
    restart: unless-stopped
    volumes:
      - /opt/repos/quartz-scripts/content:/usr/src/app/content:ro
    ports:
      - "3131:3001"
      - "8089:8080"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.quartz.entrypoints=https"
      - "traefik.http.routers.quartz.rule=Host(`quartz.mueller-nas.de`)"
      - "traefik.http.routers.quartz.tls=true"
      - "traefik.http.routers.quartz.tls.certresolver=cloudflare"
      - "traefik.http.routers.quartz.middlewares=quartz-redirect"
      - "traefik.http.routers.quartz.service=quartz"
      - "traefik.http.services.quartz.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.quartz-redirect.redirectregex.regex=^https?://[^/]+/Studium/([0-9]+)\\.-Semester/?(.*)$"
      - "traefik.http.middlewares.quartz-redirect.redirectregex.replacement=https://quartz.mueller-nas.de/Studium/$$1-Semester/$$2"
      - "traefik.http.middlewares.quartz-redirect.redirectregex.permanent=true"
      - "traefik.docker.network=proxy"

  quartz-watch:
    image: node:18-alpine
    container_name: quartz-watch
    restart: unless-stopped
    volumes:
      - /opt/repos/quartz-scripts:/app
      - /etc/docker/quartz/sync-data:/etc/docker/quartz/sync-data:ro
      - /etc/docker/quartz/runtime:/etc/docker/quartz/runtime
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: sh -c "apk add --no-cache docker-cli >/dev/null && cd /app && [ -d node_modules ] || npm install --omit=dev && node watch.mjs"
    networks:
      - proxy

  quartz-webhook:
    image: node:18-alpine
    container_name: quartz-webhook
    restart: unless-stopped
    volumes:
      - /opt/repos/quartz-scripts:/app
      - /etc/docker/quartz/sync-data:/etc/docker/quartz/sync-data:ro
      - /etc/docker/quartz/runtime:/etc/docker/quartz/runtime
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3080:3080"
    command: sh -c "apk add --no-cache docker-cli >/dev/null && cd /app && [ -d node_modules ] || npm install --omit=dev && node webhook.mjs"
    networks:
      - proxy

networks:
  proxy:
    external: true

services:
  quartz:
    image: ghcr.io/jackyzha0/quartz:latest
    container_name: quartz
    restart: unless-stopped
    volumes:
      - /opt/repos/quartz-scripts/content:/usr/src/app/content:ro
    ports:
      - "3131:3001"
      - "8089:8080"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.quartz-rtr.entrypoints=https"
      - "traefik.http.routers.quartz-rtr.rule=Host(`quartz.mueller-nas.de`)"
      - "traefik.http.routers.quartz-rtr.tls=true"
      - "traefik.http.routers.quartz-rtr.tls.certresolver=cloudflare"
      - "traefik.http.routers.quartz-rtr.middlewares=quartz-legacy-semester-redirect@file"
      - "traefik.http.routers.quartz-rtr.service=quartz-svc"
      - "traefik.http.services.quartz-svc.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy"

  quartz-watch:
    image: node:18-alpine
    container_name: quartz-watch
    restart: unless-stopped
    volumes:
      - /opt/repos/quartz-scripts:/app
      - /etc/docker/quartz/sync-data:/etc/docker/quartz/sync-data:ro
      - /etc/docker/quartz/runtime:/etc/docker/quartz/runtime
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: sh -c "apk add --no-cache docker-cli >/dev/null && cd /app && [ -d node_modules ] || npm install --omit=dev && node watch.mjs"
    networks:
      - proxy

  quartz-webhook:
    image: node:18-alpine
    container_name: quartz-webhook
    restart: unless-stopped
    volumes:
      - /opt/repos/quartz-scripts:/app
      - /etc/docker/quartz/sync-data:/etc/docker/quartz/sync-data:ro
      - /etc/docker/quartz/runtime:/etc/docker/quartz/runtime
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3080:3080"
    command: sh -c "apk add --no-cache docker-cli >/dev/null && cd /app && [ -d node_modules ] || npm install --omit=dev && node webhook.mjs"
    networks:
      - proxy

networks:
  proxy:
    external: true

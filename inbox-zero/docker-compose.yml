services:
  db:
    image: postgres:16
    container_name: inbox-zero-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-inboxzero}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - /etc/docker/inbox-zero/data/postgres:/var/lib/postgresql/data
    networks:
      - inbox-zero-network

  redis:
    image: redis:7
    container_name: inbox-zero-redis
    restart: always
    volumes:
      - /etc/docker/inbox-zero/data/redis:/data
    networks:
      - inbox-zero-network

  serverless-redis-http:
    image: hiett/serverless-redis-http:latest
    container_name: inbox-zero-redis-http
    restart: always
    environment:
      SRH_MODE: env
      SRH_TOKEN: ${UPSTASH_REDIS_TOKEN}
      SRH_CONNECTION_STRING: "redis://redis:6379"
    networks:
      - inbox-zero-network

  web:
    image: ghcr.io/elie222/inbox-zero:latest
    container_name: inbox-zero
    pull_policy: missing
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - inbox-zero-network
      - proxy
      - ollama
    environment:
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-inboxzero}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-inboxzero}?schema=public
      UPSTASH_REDIS_URL: http://serverless-redis-http:80
      INTERNAL_API_URL: http://web:3000
      HOSTNAME: "0.0.0.0"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.inbox-zero.entrypoints=http"
      - "traefik.http.routers.inbox-zero.rule=Host(`inbox-zero.mueller-nas.de`)"
      - "traefik.http.middlewares.inbox-zero-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.inbox-zero.middlewares=inbox-zero-https-redirect"
      - "traefik.http.routers.inbox-zero-webhook.entrypoints=https"
      - "traefik.http.routers.inbox-zero-webhook.rule=Host(`inbox-zero.mueller-nas.de`) && PathPrefix(`/api/google/webhook`)"
      - "traefik.http.routers.inbox-zero-webhook.tls=true"
      - "traefik.http.routers.inbox-zero-webhook.tls.certresolver=cloudflare"
      - "traefik.http.routers.inbox-zero-webhook.service=inbox-zero"
      - "traefik.http.routers.inbox-zero-webhook.priority=100"
      - "traefik.http.routers.inbox-zero-secure.entrypoints=https"
      - "traefik.http.routers.inbox-zero-secure.middlewares=authentik@docker"
      - "traefik.http.routers.inbox-zero-secure.rule=Host(`inbox-zero.mueller-nas.de`)"
      - "traefik.http.routers.inbox-zero-secure.tls=true"
      - "traefik.http.routers.inbox-zero-secure.tls.certresolver=cloudflare"
      - "traefik.http.routers.inbox-zero-secure.service=inbox-zero"
      - "traefik.http.routers.inbox-zero-secure.priority=10"
      - "traefik.http.services.inbox-zero.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"

  cron:
    image: alpine:latest
    container_name: inbox-zero-cron
    command: >
      sh -c "
        apk add --no-cache curl ;
        (
          while true; do
            echo \"[cron] Processing scheduled actions...\"
            curl -s -X GET 'http://web:3000/api/cron/scheduled-actions' -H \"Authorization: Bearer $${CRON_SECRET}\" || echo \"[cron] Warning: scheduled-actions request failed\"
            sleep 900
          done
        ) &
        (
          while true; do
            echo \"[cron] Processing automation jobs...\"
            curl -s -X GET 'http://web:3000/api/cron/automation-jobs' -H \"Authorization: Bearer $${CRON_SECRET}\" || echo \"[cron] Warning: automation-jobs request failed\"
            sleep 900
          done
        ) &
        (
          while true; do
            echo \"[cron] Processing follow-up reminders...\"
            curl -s -X GET 'http://web:3000/api/follow-up-reminders' -H \"Authorization: Bearer $${CRON_SECRET}\" || echo \"[cron] Warning: follow-up-reminders request failed\"
            sleep 3600
          done
        ) &
        (
          while true; do
            echo \"[cron] Processing digest emails...\"
            curl -s -X GET 'http://web:3000/api/resend/digest/all' -H \"Authorization: Bearer $${CRON_SECRET}\" || echo \"[cron] Warning: digest request failed\"
            sleep 1800
          done
        ) &
        (
          while true; do
            echo \"[cron] Processing meeting briefs...\"
            curl -s -X GET 'http://web:3000/api/meeting-briefs' -H \"Authorization: Bearer $${CRON_SECRET}\" || echo \"[cron] Warning: meeting-briefs request failed\"
            sleep 900
          done
        ) &
        (
          while true; do
            echo \"[cron] Renewing email watches...\"
            curl -s -X GET 'http://web:3000/api/watch/all' -H \"Authorization: Bearer $${CRON_SECRET}\" || echo \"[cron] Warning: watch request failed\"
            sleep 21600
          done
        ) &
        wait
      "
    env_file:
      - .env
    depends_on:
      - web
    networks:
      - inbox-zero-network
    restart: always

networks:
  inbox-zero-network:
  ollama:
    external: true
  proxy:
    external: true
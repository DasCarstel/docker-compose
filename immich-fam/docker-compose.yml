#
# WARNING: Make sure to use the docker-compose.yml of the current release:
#
# https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
#
# The compose file on main may not be compatible with the latest release.
#

name: immich-fam

services:
  immich-server:
    container_name: immich_fam_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      # Do not edit the next line. If you want to change the media storage location on your system, edit the value of UPLOAD_LOCATION in the .env file
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    # DEBUG: Bei Bedarf mit debug-ports.sh temporär aktivieren
    # ports:
    #   - '2284:2283'
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich-familie.entrypoints=http"
      - "traefik.http.routers.immich-familie.rule=Host(`immich-familie.mueller-nas.de`)"
      - "traefik.http.middlewares.immich-familie-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.immich-familie.middlewares=immich-familie-https-redirect"
      - "traefik.http.routers.immich-familie-secure.entrypoints=https"
      - "traefik.http.routers.immich-familie-secure.rule=Host(`immich-familie.mueller-nas.de`)"
      - "traefik.http.routers.immich-familie-secure.tls=true"
      - "traefik.http.routers.immich-familie-secure.service=immich-familie"
      - "traefik.http.services.immich-familie.loadbalancer.server.port=2283"
      - "traefik.docker.network=proxy"
    networks:
      proxy:
      internal:
    security_opt:
      - no-new-privileges:true

  immich-machine-learning:
    container_name: immich_fam_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, openvino] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, openvino, openvino-wsl] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always
    healthcheck:
      disable: false
    networks:
      internal:

  redis:
    container_name: immich_fam_redis
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    networks:
      internal:

  database:
    container_name: immich_fam_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    networks:
      internal:

volumes:
  model-cache:

networks:
  proxy:
    external: true
  internal:
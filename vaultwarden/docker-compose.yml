services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - /etc/docker/vaultwarden:/data
    environment:
     - ADMIN_TOKEN=${ADMIN_TOKEN}
     - WEBSOCKET_ENABLED=true
     - SIGNUPS_ALLOWED=false
     - DOMAIN=${DOMAIN}
     - ROCKET_CORS_ORIGINS=*
     - SSO_ENABLED=true
     - SSO_ONLY=false
     - SSO_AUTHORITY=https://auth.mueller-nas.de/application/o/vaultwarden/
     - SSO_CLIENT_ID=${SSO_CLIENT_ID}
     - SSO_CLIENT_SECRET=${SSO_CLIENT_SECRET}
     - SSO_SCOPES=openid profile email offline_access
     - SSO_SIGNUPS_MATCH_EMAIL=true
     - SSO_PKCE=true
     - SSO_DEBUG_TOKENS=true
     - LOG_LEVEL=info,vaultwarden::sso=debug
    labels:
      - traefik.enable=true
      - traefik.http.routers.vaultwarden.entrypoints=http
      - traefik.http.routers.vaultwarden.rule=Host(`vaultwarden.mueller-nas.de`)
      - traefik.http.middlewares.vaultwarden-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.vaultwarden.middlewares=vaultwarden-https-redirect,vaultwarden-cors-fix
      - traefik.http.routers.vaultwarden-secure.entrypoints=https
      - traefik.http.routers.vaultwarden-secure.rule=Host(`vaultwarden.mueller-nas.de`)
      - traefik.http.routers.vaultwarden-secure.tls=true
      - traefik.http.routers.vaultwarden-secure.service=vaultwarden
      - traefik.http.routers.vaultwarden-secure.middlewares=vaultwarden-cors-fix
      - traefik.http.services.vaultwarden.loadbalancer.server.port=80
      - traefik.http.middlewares.vaultwarden-cors-fix.headers.accesscontrolalloworiginlist=*
      - traefik.http.middlewares.vaultwarden-cors-fix.headers.accesscontrolallowmethods=GET,HEAD,POST,PUT,DELETE,OPTIONS,PATCH
      - traefik.http.middlewares.vaultwarden-cors-fix.headers.accesscontrolallowheaders=*
      - traefik.http.middlewares.vaultwarden-cors-fix.headers.accesscontrolmaxage=600
      - traefik.docker.network=proxy
networks:
  proxy:
    external: true

services:
  backend:
    image: zimengxiong/excalidash-backend:latest
    container_name: excalidash-backend
    environment:
      - DATABASE_PROVIDER=sqlite
      - DATABASE_URL=file:/app/prisma/dev.db
      - PORT=8000
      - NODE_ENV=production
      - AUTH_MODE=oidc_enforced
      - TRUST_PROXY=1
      - ENFORCE_HTTPS_REDIRECT=false
      - FRONTEND_URL=https://excalidash.mueller-nas.de
      - JWT_SECRET=d187fc7eecf297c29e79b75d1e5943b25ad510114cb1c0a4d677c4abeac41fdf
      - CSRF_SECRET=d1c25990cce90b35081c1c2b18c1e2357ab5a1d08a419df2e23591a80db18d1c
      - OIDC_PROVIDER_NAME=Authentik
      - OIDC_ISSUER_URL=https://auth.mueller-nas.de/application/o/excalidash/
      - OIDC_CLIENT_ID=6ByoliKkTvzCYDzD1ClgLvlVU1kfQdryfemwfX12
      - OIDC_CLIENT_SECRET=enjXeXxAzMHe3Ocjqr9WMsmYkT0gQxSqXPA9eiYG5Ml4QRc0uSI0WcjWCaHC0R5uWL3yqipluNU3UMQAAN9CpZyYoQKjYFtzvbhe7GgGwu9jYiMqH5lWcqJrM3PXJ3ek
      - OIDC_REDIRECT_URI=https://excalidash.mueller-nas.de/api/auth/oidc/callback
      - OIDC_SCOPES=openid profile email
      - OIDC_REQUIRE_EMAIL_VERIFIED=false
    volumes:
      - backend-data:/app/prisma
    networks:
      - excalidash-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: zimengxiong/excalidash-frontend:latest
    container_name: excalidash-frontend
    environment:
      - BACKEND_URL=backend:8000
    depends_on:
      - backend
    networks:
      - excalidash-network
      - proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:80",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.excalidash.entrypoints=http"
      - "traefik.http.routers.excalidash.rule=Host(`excalidash.mueller-nas.de`)"
      - "traefik.http.middlewares.excalidash-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.excalidash.middlewares=excalidash-https-redirect"
      - "traefik.http.routers.excalidash-secure.entrypoints=https"
      - "traefik.http.routers.excalidash-secure.rule=Host(`excalidash.mueller-nas.de`)"
      - "traefik.http.routers.excalidash-secure.tls=true"
      - "traefik.http.routers.excalidash-secure.service=excalidash"
      - "traefik.http.services.excalidash.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"

networks:
  excalidash-network:
    driver: bridge
  proxy:
    external: true

volumes:
  backend-data:

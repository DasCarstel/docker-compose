services:
  gluetun:
    image: ghcr.io/qdm12/gluetun:v3.39
    container_name: Linkwarden-gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8889:8888/tcp
      - 8389:8388/tcp
      - 8389:8388/udp
      - 7461:3000
    volumes:
      - /etc/docker/gluetun/linkwarden:/gluetun
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.linkwarden.entrypoints=http"
      - "traefik.http.routers.linkwarden.rule=Host(`linkwarden.mueller-nas.de`)"
      - "traefik.http.middlewares.linkwarden-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.linkwarden.middlewares=linkwarden-https-redirect"
      - "traefik.http.routers.linkwarden-secure.entrypoints=https"
      - "traefik.http.routers.linkwarden-secure.rule=Host(`linkwarden.mueller-nas.de`)"
      - "traefik.http.routers.linkwarden-secure.tls=true"
      - "traefik.http.routers.linkwarden-secure.service=linkwarden"
      - "traefik.http.services.linkwarden.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"
    extra_hosts:
      - "auth.mueller-nas.de:192.168.80.1"
    security_opt:
      - no-new-privileges:true
    environment:
      - VPN_SERVICE_PROVIDER=nordvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      - TZ=Europe/Berlin
    networks:
      - linkwarden_internal
      - proxy
    restart: unless-stopped

  db:
    image: postgres:18
    container_name: Linkwarden-DB
    hostname: linkwarden-db
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "linkwarden", "-U", "linkwardenuser"]
      timeout: 45s
      interval: 10s
      retries: 10
    volumes:
      - /etc/docker/postgres/linkwarden:/var/lib/postgresql
    environment:
      POSTGRES_DB: linkwarden
      POSTGRES_USER: linkwardenuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: on-failure:5
    networks:
      linkwarden_internal:
        ipv4_address: 172.23.0.4

  encryption-sidecar:
    image: encryption-sidecar:latest
    container_name: Linkwarden-encryption
    restart: unless-stopped
    environment:
      - ENCRYPTION_PASSWORD=${ENCRYPTION_PASSWORD}
      - SYNC_INTERVAL=120
    volumes:
      - /etc/docker/linkwarden/archives.enc:/encrypted
      - linkwarden_archives_decrypted:/decrypted
    tmpfs:
      - /tmp:mode=1777

  linkwarden:
    image: ghcr.io/linkwarden/linkwarden:latest
    container_name: Linkwarden
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/docker/linkwarden/config:/data/data/config
      - linkwarden_archives_decrypted:/data/data/archives
    environment:
      DATABASE_URL: postgres://linkwardenuser:${POSTGRES_PASSWORD}@172.23.0.4:5432/linkwarden
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_DISABLE_REGISTRATION: false
      MEILI_HOST: http://localhost:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      NEXT_PUBLIC_AUTHENTIK_ENABLED: ${NEXT_PUBLIC_AUTHENTIK_ENABLED}
      AUTHENTIK_CUSTOM_NAME: ${AUTHENTIK_CUSTOM_NAME}
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET}
    restart: on-failure:5
    depends_on:
      gluetun:
        condition: service_started
      db:
        condition: service_healthy
      encryption-sidecar:
        condition: service_started
      meilisearch:
        condition: service_started
    network_mode: service:gluetun

  meilisearch:
    image: getmeili/meilisearch:v1.12.8
    container_name: Linkwarden-Meilisearch
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_NO_ANALYTICS=true
      - MEILI_ENV=production
    volumes:
      - /etc/docker/linkwarden/meili_data:/meili_data
    network_mode: service:gluetun

volumes:
  linkwarden_archives_decrypted:
    driver: local

networks:
  proxy:
    external: true
  linkwarden_internal:
    ipam:
      config:
        - subnet: 172.23.0.0/24

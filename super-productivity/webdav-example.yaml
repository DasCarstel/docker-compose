address: 0.0.0.0
port: 2345

prefix: /
permissions: CRUD

cors:
  enabled: true
  credentials: true
  allowed_headers:
    - '*'
  allowed_hosts:
    - superproductivity.mueller-nas.de
    - webdav-superproductivity.mueller-nas.de
  allowed_origins:
    - https://superproductivity.mueller-nas.de
    - https://webdav-superproductivity.mueller-nas.de
  allowed_methods:
    - GET
    - HEAD
    - POST
    - PUT
    - DELETE
    - OPTIONS
    - PROPFIND
    - PROPPATCH
    - MKCOL
    - COPY
    - MOVE
    - LOCK
    - UNLOCK
  exposed_headers:
    - '*'

users:
  - username: admin
    password: change-me
    directory: /data

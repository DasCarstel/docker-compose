services:
  app:
    image: johannesjo/super-productivity:latest
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - WEBDAV_BASE_URL=http://webdav:2345/
      - WEBDAV_USERNAME=admin
      - WEBDAV_PASSWORD=${WEBDAV_PASSWORD}
      - WEBDAV_SYNC_FOLDER_PATH=/
      - SYNC_INTERVAL=15
      - IS_COMPRESSION_ENABLED=true
      - IS_ENCRYPTION_ENABLED=false
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.superproductivity.entrypoints=http"
      - "traefik.http.routers.superproductivity.rule=Host(`superproductivity.mueller-nas.de`)"
      - "traefik.http.middlewares.superproductivity-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.superproductivity.middlewares=superproductivity-https-redirect"
      - "traefik.http.routers.superproductivity-secure.entrypoints=https"
      - "traefik.http.routers.superproductivity-secure.rule=Host(`superproductivity.mueller-nas.de`)"
      - "traefik.http.routers.superproductivity-secure.tls=true"
      - "traefik.http.routers.superproductivity-secure.service=superproductivity"
      - "traefik.http.routers.superproductivity-secure.middlewares=authelia@docker"
      - "traefik.http.services.superproductivity.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"
    networks:
      - proxy
    depends_on:
      - webdav

  webdav:
    image: hacdias/webdav:v5
    restart: unless-stopped
    expose:
      - "2345"
    volumes:
      - /etc/docker/webdav-super-productivity/config/webdav.yaml:/etc/webdav/config.yaml:ro
      - /etc/docker/superproductivity:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webdav.entrypoints=http"
      - "traefik.http.routers.webdav.rule=Host(`webdav-superproductivity.mueller-nas.de`)"
      - "traefik.http.middlewares.webdav-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.webdav.middlewares=webdav-https-redirect,webdav-cors"
      - "traefik.http.routers.webdav-secure.entrypoints=https"
      - "traefik.http.routers.webdav-secure.rule=Host(`webdav-superproductivity.mueller-nas.de`)"
      - "traefik.http.routers.webdav-secure.tls=true"
      - "traefik.http.routers.webdav-secure.service=webdav"
      - "traefik.http.routers.webdav-secure.middlewares=webdav-cors"
      - "traefik.http.routers.webdav-preflight.entrypoints=https"
      - "traefik.http.routers.webdav-preflight.rule=Host(`webdav-superproductivity.mueller-nas.de`) && Method(`OPTIONS`)"
      - "traefik.http.routers.webdav-preflight.middlewares=webdav-cors"
      - "traefik.http.routers.webdav-preflight.service=noop@internal"
      - "traefik.http.routers.webdav-preflight.priority=100"
      - "traefik.http.services.webdav.loadbalancer.server.port=2345"
      - "traefik.http.middlewares.webdav-cors.headers.accesscontrolalloworiginlistregex=^https://superproductivity\\.mueller-nas\\.de$|^https://webdav-superproductivity\\.mueller-nas\\.de$|^app://.*$|^file://.*$|^null$"
      - "traefik.http.middlewares.webdav-cors.headers.accesscontrolallowmethods=GET,HEAD,POST,PUT,DELETE,OPTIONS,PROPFIND,PROPPATCH,MKCOL,COPY,MOVE,LOCK,UNLOCK"
      - "traefik.http.middlewares.webdav-cors.headers.accesscontrolallowheaders=authorization,content-type,depth,if,lock-token,destination,overwrite,range,accept,origin,access-control-request-private-network"
      - "traefik.http.middlewares.webdav-cors.headers.accesscontrolallowcredentials=true"
      - "traefik.http.middlewares.webdav-cors.headers.customresponseheaders.Alt-Svc="
      - "traefik.http.middlewares.webdav-cors.headers.customresponseheaders.Access-Control-Allow-Private-Network=true"
      - "traefik.http.middlewares.webdav-cors.headers.accesscontrolmaxage=600"
      - "traefik.docker.network=proxy"
    networks:
      - proxy

networks:
  proxy:
    external: true
